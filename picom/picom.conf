# --- BACKEND & PERFORMANCE ---
# Mantenemos glapi para estabilidad en Fedora
backend = "glx";
vsync = true;
use-damage = true;
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
unredir-if-possible = true;

# Optimizaciones de renderizado adicionales
xrender-sync-fence = true;
glx-use-copysubbuffermesa = false;

# --- BORDES & ESTÉTICA ---
corner-radius = 8.0;
round-borders = 1;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

# --- BLUR (Mantenido según tu petición) ---
blur: {
  method = "none";
#  strength = 2;
};

blur-background-exclude = [
 "window_type = 'dock'",
 "window_type = 'desktop'",
 "class_g != 'Alacritty'",
];

# --- OPACIDAD ---
active-opacity = 1.0;
inactive-opacity = 1.0;
#opacity-rule = [ #"100:class_g = 'st-256color'",
#"100:class_g = 'st'"
#];

#pa
detect-client-opacity = false;


# Eliminamos reglas redundantes para ahorrar ciclos de CPU

# --- ANIMACIONES (RE-INGENIERÍA PARA SNAPPINESS) ---
animations = true;

# La clave para que no se sientan pesadas es aumentar la tensión
# y ajustar el amortiguamiento para que el final sea seco y no "chicloso".
animation-stiffness = 160;    # Más alto = inicio de animación más explosivo
animation-dampening = 21;     # Equilibrio para que no rebote pero frene suave
animation-mass = 0.9;         # Menos masa = menos inercia, se siente más ligero
animation-clamping = true;    # Evita que la animación sobrepase el valor final

# Delta de 8-10 es el sweet spot para pantallas de 60Hz-144Hz.
animation-delta = 10;

# Zoom es estético, pero "slide-up" suele sentirse más ligero visualmente.
# Si prefieres zoom, estos valores de física lo harán sentir eléctrico.
animation-for-open-window = "zoom";
animation-for-unmap-window = "zoom";
animation-for-workspace-switch-in = "zoom";
animation-for-workspace-switch-out = "zoom";
animation-for-transient-window = "zoom"; # Añadido para diálogos

# --- REGLAS EXTRAS ---
wintypes:
{
  tooltip = { fade = true; shadow = false; opacity = 0.85; focus = true; };
  dock = { shadow = false; clip-shadow-above = true; }
  dnd = { shadow = false; }
};
