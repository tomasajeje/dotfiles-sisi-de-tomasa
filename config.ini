[bar/mybar]
width = 100%
height = 24pt
radius = 0

background = #282a36
foreground = #f8f8f2

line-size = 3pt

padding-left = 1
padding-right = 1

module-margin = 2

# --- CONFIGURACIÓN DE FUENTES ---
# Asegúrate de tener instalado el paquete 'nerd-fonts-hack' o similar
font-0 = "Hack:size=10;2"
font-1 = "Hack Nerd Font:size=11;2"

# Reloj al centro, volumen al lado de los workspaces
modules-left = xworkspaces pulseaudio
modules-center = date
modules-right = cpu memory battery network

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

tray-position = right
tray-padding = 2

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = #44475a
label-active-underline = #6d8895
label-active-padding = 1
label-occupied = %name%
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = #ff5555
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = #6272a4
label-empty-padding = 1

# --- MÓDULO DE VOLUMEN CON ICONO ---
[module/pulseaudio]
type = internal/pulseaudio

# Aquí usamos los glifos de Hack Nerd Font
format-volume = <label-volume>
label-volume = 󰕾 %percentage%%
label-volume-foreground = #f8f8f2

label-muted = 󰝟 MUTE
label-muted-foreground = #ff5555

# El scroll para subir/bajar volumen funciona nativamente aquí
# -----------------------------------

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = #6d8895
label = %percentage%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = #6d8895
label = %percentage_used%%

[module/network]
type = internal/network
interface = wlo1
interval = 3.0
format-connected = <label-connected>
format-connected-prefix = "WIFI "
format-connected-prefix-foreground = #6d8895
label-connected = %essid%
format-disconnected = <label-disconnected>
label-disconnected = "OFF"
label-disconnected-foreground = #ff5555

[module/battery]
type = custom/script
exec = ~/.config/polybar/battery.sh
interval = 10

[module/date]
type = internal/date
interval = 1
date = %H:%M
label = %date%
label-foreground = #f8f8f2
